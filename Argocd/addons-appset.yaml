apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: argocd

spec:
  goTemplate: true
  # goTemplateOptions:
  #   - missingkey=err
  generators:
    - git:
        repoURL: https://github.com/xin1lanthua123/CD-repo.git
        revision: main
        files:
          - path: addons/*/addons.yaml

  template:
    metadata:
      name: '{{.name}}-addons'

    spec:
      project: default

      sources:
      - repoURL: '{{.repoURL}}'
        chart: '{{.chart}}'
        targetRevision: '{{.version}}'
        helm:
          releaseName: '{{.name}}'
          valueFiles:
            - '$values/{{.valuesFile}}'

      - repoURL: https://github.com/xin1lanthua123/CD-repo.git
        targetRevision: main
        ref: values

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.namespace}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true # problem: quá tải annotations -> giải pháp : dùng SSA để kubernetes api server tư quản lý annotations -> không giới hạn
          - Validate=true
          - CreateNamespace=true
          - PruneLast=true