apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: checkoutservice-success-rate
spec:
  # Định nghĩa tham số để tái sử dụng hoặc thay đổi linh hoạt nếu cần
  args:
    - name: service-name
      value: checkoutservice

  metrics:
  - name: success-rate
    interval: 30s
    successCondition: result >= 0.95
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus.observability.svc.cluster.local:9090
        query: |
          sum(
            rate(
              istio_requests_total{
                destination_service_name="{{args.service-name}}",
                reporter="destination",
                response_code!~"5.*"
              }[5m]
            )
          )
          /
          sum(
            rate(
              istio_requests_total{
                destination_service_name="{{args.service-name}}",
                reporter="destination"
              }[5m]
            )
          )
          
  - name: latency-p95
    interval: 30s
    successCondition: result < 500
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus.observability.svc.cluster.local:9090
        query: |
          histogram_quantile(
            0.95,
            sum(
              rate(
                istio_request_duration_milliseconds_bucket{
                  destination_service_name="{{args.service-name}}",
                  reporter="destination"
                }[5m]
              )
            )
            by(le)
          )
