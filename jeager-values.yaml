storage:
  type: elasticsearch
  elasticsearch:
    host: elasticsearch-master.logging.svc  # Replace with your Elasticsearch service DNS
    port: 9200
    scheme: https
    user: elastic  # Replace with the actual username if necessary
    password: fPsqq6Ll8vDiNGXqr2e3u4I9 # Replace with the actual password
    tls:
      enabled: true
      existingSecret: eck-elasticsearch-es-http-certs-public
      caCertKey: tls.crt
  # Path where the CA cert is mountedd

provisionDataStore:
  cassandra: false
  elasticsearch: false

query:
  cmdlineParams:
    es.tls.ca: "/tls/ca-cert.pem"
  extraConfigmapMounts:
    - name: jaeger-tls
      mountPath: /tls
      subPath: ""
      configMap: jaeger-tls
      readOnly: true

collector:
  cmdlineParams:
    es.tls.ca: "/tls/ca-cert.pem"
  extraConfigmapMounts:
    - name: jaeger-tls
      mountPath: /tls
      subPath: ""
      configMap: jaeger-tls
      readOnly: true


