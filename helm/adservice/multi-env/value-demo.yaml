############################################
# GLOBAL / COMMON
############################################
global:
  nameOverride: ""
  fullnameOverride: ""

############################################
# ARGOCD / SYNC CONTROL
############################################
argocd:
  syncWave:
    externalSecret: "-1"
    secret: "0"
    configMap: "0"
    deployment: "5"
    hpa: "6"
    ingress: "7"
    httpRoute: "7"

############################################
# WORKLOAD (DEPLOYMENT / POD)
############################################
workload:
  replicaCount: 1

  image:
    repository: nginx
    tag: ""
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  pod:
    annotations: {}
    labels: {}

    securityContext: {}

  container:
    securityContext: {}

  resources: {}

  probes:
    liveness:
      httpGet:
        path: /
        port: http
    readiness:
      httpGet:
        path: /

  nodeSelector: {}
  tolerations: []
  affinity: {}

  volumes: []
  volumeMounts: []

############################################
# SERVICE ACCOUNT
############################################
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

############################################
# SERVICE (ClusterIP / NodePort / LB)
############################################
service:
  type: ClusterIP
  port: 80

############################################
# INGRESS (NGINX / ALB / etc)
############################################
ingress:
  enabled: false
  className: ""

  annotations: {}

  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific

  tls: []

############################################
# GATEWAY API (HTTPRoute)
############################################
httpRoute:
  enabled: false

  annotations: {}

  parentRefs:
    - name: gateway
      sectionName: http

  hostnames:
    - chart-example.local

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

############################################
# AUTOSCALING (HPA)
############################################
hpa:
  enabled: false

  minReplicas: 1
  maxReplicas: 100

  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

############################################
# SECRET MANAGEMENT (External Secrets)
############################################
secret:
  enabled: true

  name: app-secret

  external:
    enabled: true

    secretStore:
      name: aws-sm
      kind: SecretStore

    target:
      name: app-secret

    data:
      passwordKey: prod/db/password

  fallback:
    enabled: false
    data:
      username: admin
      password: admin123