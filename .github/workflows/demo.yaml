name: echo workflow

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - ci/feature/*

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Echo validate job
        run: |
          echo "Running validate job..."
          echo "Workflow is working!"

  helm-check:
    runs-on: ubuntu-latest

    steps:
      - name: Echo helm check
        run: |
          echo "Running helm-check job..."
          echo "Helm check simulated successfully!"

  iac-scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Echo IaC scan
        run: |
          echo "Running IaC Security Scan..."
          echo "Terraform scan simulated!"
          echo "Kubernetes scan simulated!"