name: validate workflow
on:
  workflow_dispatch:
      inputs:
        action:
            description: " action"
            required: true
            default: "dev"
            type: choice
            options:
            - dev
            - staging
            - prod
  # pull_request:
  #   branches:
  #     - main
  # push:
  #   branches:
  #     - main

concurrency:
  group: gitops-${{ github.ref }}
  cancel-in-progress: true
jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      helm-chart: ${{ steps.extract.outputs.services }}
      helm-chart_changed: ${{ steps.extract.outputs.services_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Paths Filter
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d #vv4.0.1
        with:
          list-files: shell
          filters: |
            helm-chart:
              - 'helm-chart/**'
            github-file:
              - '.github/workflows/validate-manifest.yaml'

      - name: Extract helm chart services
        id: extract
        shell: bash
        run: |
          set -euo pipefail

          HELM_FILES="${{ steps.filter.outputs.helm-chart_files }}"
          GITHUB_FILES="${{ steps.filter.outputs.github-file_files}}"

          if [ -n "$HELM_FILES" ]; then

            MODIFIED_SERVICES=$(
              echo "$HELM_FILES" \
                | tr ' ' '\n' \
                | cut -d'/' -f2 \
                | sort -u \
                | jq -R -s -c 'split("\n") | map(select(length>0))'
            )

            SERVICES="$MODIFIED_SERVICES"
          elif [ -n "$GITHUB_FILES" ]; then

            ALL_SERVICES=$(
              find services -mindepth 1 -maxdepth 1 -type d -printf "%f\n" \
                | jq -R -s -c 'split("\n") | map(select(length>0))'
            )

            SERVICES="$ALL_SERVICES"
          else
            SERVICES="[]"
          fi

          if [ "$SERVICES" != "[]" ]; then
            echo "services_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "services_changed=false" >> "$GITHUB_OUTPUT"
          fi


          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"

  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .

  k8s-scan:
    name: " K8s manifest scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Kubernetes manifests
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: kubernetes-manifest/
          framework: kubernetes
          soft_fail: true  # Soft fail for K8s (some checks may not apply)
          output_format: cli

  helm-check:
    needs : detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.helm-chart_changed == 'true'
    strategy:
      fail-fast: false 
      matrix:
        helm-chart: ${{ fromJson(needs.detect-changes.outputs.helm-chart) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        working-directory: helm-chart/${{matrix.helm-chart}}
        run: |
            find . -name "Chart.yaml" | while read -r file ; do
                dir=$(dirname "$file")
                helm lint $dir
            done

      - name: Helm template render check
        working-directory: helm-chart/${{matrix.helm-chart}}
        run: |
            find . -name "Chart.yaml"  | while read -r file ; do
                dir=$(dirname "$file")
                helm template test $dir > /dev/null
            done


        
       
      

 