name: GitOps Deploy Events

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deployment-event:
    name: Deployment Event
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4

      - name: Detect changed environments
        id: changes
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          echo "Before SHA: $BEFORE"
          echo "After SHA: $AFTER"

          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")

          echo "Changed files:"
          echo "$CHANGED"

          DEV_CHANGED=false
          STAGING_CHANGED=false
          PROD_CHANGED=false

          if echo "$CHANGED" | grep -q "^environments/dev/"; then
            DEV_CHANGED=true
          fi

          if echo "$CHANGED" | grep -q "^environments/staging/"; then
            STAGING_CHANGED=true
          fi

          if echo "$CHANGED" | grep -q "^environments/prod/"; then
            PROD_CHANGED=true
          fi

          echo "dev_changed=$DEV_CHANGED" >> $GITHUB_OUTPUT
          echo "staging_changed=$STAGING_CHANGED" >> $GITHUB_OUTPUT
          echo "prod_changed=$PROD_CHANGED" >> $GITHUB_OUTPUT

      - name: DEV deployment detected
        if: steps.changes.outputs.dev_changed == 'true'
        run: |
          echo "DEV deployment manifests updated"


      - name: PROD deployment detected
        if: steps.changes.outputs.prod_changed == 'true'
        run: |
          echo "PROD deployment manifests updated"

