{{- if and .Values.checkoutService.create .Values.checkoutService.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.checkoutService.name }}
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    {{- if eq .Values.checkoutService.workload.type "rollout" }}
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    {{- else if eq .Values.checkoutService.workload.type "deployment" }}
    apiVersion: apps/v1
    kind: Deployment
    {{- end }}
    name: {{ .Values.checkoutService.name }}

  minReplicas: {{ .Values.checkoutService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.checkoutService.autoscaling.maxReplicas }}

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.checkoutService.autoscaling.targetCPU }}

    {{- if .Values.checkoutService.autoscaling.memory.enabled }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.checkoutService.autoscaling.memory.target }}
    {{- end }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:

        - type: Pods
          value: 4
          periodSeconds: 60

     
        - type: Percent
          value: 100
          periodSeconds: 60

    scaleDown:
   
      stabilizationWindowSeconds: 300
      selectPolicy: Min
      policies:
       
        - type: Pods
          value: 1
          periodSeconds: 60
{{- end }}