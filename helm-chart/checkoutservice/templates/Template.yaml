{{- if and .Values.checkoutService.create (eq .Values.checkoutService.workload.type "rollout") }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ .Values.checkoutService.name }}-success-rate
spec:
  args:
    - name: service-name
      value: {{ .Values.checkoutService.name }}

  metrics:
  - name: success-rate
    interval: 30s
    successCondition: result >= 0.95
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus.observability.svc.cluster.local:8889
        query: |
          sum(
            rate(
              istio_requests_total{
                destination_service_name="{{`{{args.service-name}}`}}",
                reporter="destination",
                response_code!~"5.*"
              }[5m]
            )
          )
          /
          sum(
            rate(
              istio_requests_total{
                destination_service_name="{{`{{args.service-name}}`}}",
                reporter="destination"
              }[5m]
            )
          )
          
  - name: latency-p95
    interval: 30s
    successCondition: result < 500
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus.observability.svc.cluster.local:8889
        query: |
          histogram_quantile(
            0.95,
            sum(
              rate(
                istio_request_duration_milliseconds_bucket{
                  destination_service_name="{{`{{args.service-name}}`}}",
                  reporter="destination"
                }[5m]
              )
            )
            by(le)
          )
{{- end }}