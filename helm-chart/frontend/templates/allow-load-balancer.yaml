{{- if .Values.networkPolicies.create }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-allow-alb
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - ipBlock:
        cidr: 10.0.0.0/24 
    - ipBlock:
        cidr: 10.0.1.0/24 
    ports:
    - port: 8080 
      protocol: TCP
{{- end }}
