apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: monitoring
spec:
  hostnames:
    - grafana.quanldl.click

  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: app-alb-gateway
      namespace: default
      sectionName: http

  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301