apiVersion: v1
kind: Namespace
metadata:
  name: policy-test
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  namespace: policy-test
  labels:
    app: web
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    ports:
    - containerPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: client-pod
  namespace: policy-test
  labels:
    app: client
spec:
  containers:
  - name: alpine
    image: alpine
    command: ["sleep", "3600"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: block-all-ingress-to-web
  namespace: policy-test
spec:
  podSelector:
    matchLabels:
      app: web # Áp dụng chính sách này lên các pod có nhãn app=web
  policyTypes:
  - Ingress
  ingress: [] # Mảng trống = Không cho phép bất kỳ ai đi vào

