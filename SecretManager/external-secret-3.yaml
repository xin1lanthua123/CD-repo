# externalsecret.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-slack-token
  namespace: argocd
spec:
  refreshInterval: 5s # Check for updates every 5 seconds
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: argocd-slack-secret # K8s Secret name
    creationPolicy: Owner
  data:
  - secretKey: slack-token
    remoteRef:
      key: prod/argocd # aws secret manager secret name
      property: slack-token


