mode: deployment
fullnameOverride: opentelemetrycollector-gateway
replicaCount: 2

image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.154.0

command:
  name: otelcol-contrib

service:
  type: ClusterIP
  clusterIP: None

ports:
  otlp:
    enabled: true
    containerPort: 4317
  otlp-http:
    enabled: true
    containerPort: 4318
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP
    appProtocol: TCP

config:

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    prometheus:
      config:
        scrape_configs:
          - job_name: kube-state-metrics
            scrape_interval: 30s
            static_configs:
              - targets:
                  - kube-prometheus-stack-kube-state-metrics.observability.svc.cluster.local:8080
          - job_name: istio-metrics
            scrape_interval: 30s
            static_configs:
              - targets:
                  - istiod.istio-system.svc.cluster.local:15014
          - job_name: istio-envoy

            kubernetes_sd_configs:
            - role: pod

            relabel_configs:

            - source_labels:
              - __meta_kubernetes_pod_container_name
              action: keep
              regex: istio-proxy


            - source_labels:
              - __meta_kubernetes_pod_ip
              target_label: __address__
              replacement: $${1}:15090


            - target_label: __metrics_path__
              replacement: /stats/prometheus


  processors:

    memory_limiter:
      check_interval: 2s
      limit_percentage: 80
      spike_limit_percentage: 15

    transform:
      error_mode: ignore
      trace_statements:
        - context: span
          statements:
            - replace_pattern(name, "\\?.*", "")
            - replace_match(name, "GET /api/product/*", "GET /api/product/{productId}")
    tail_sampling:
      decision_wait: 10s
      num_traces: 100000
      expected_new_traces_per_sec: 500
      policies:

      - name: errors
        type: status_code
        status_code:
          status_codes:
            - ERROR

      - name: slow
        type: latency
        latency:
          threshold_ms: 1000

      - name: probabilistic
        type: probabilistic
        probabilistic:
          sampling_percentage: 20

    batch:
      send_batch_size: 2048
      send_batch_max_size: 4096
      timeout: 5s

  exporters:
    prometheus:
      endpoint: "0.0.0.0:8889"

    otlp/jaeger:
      endpoint: "jaeger.observability:4317"  # Update as per your Jaeger service
      tls:
        insecure: true
      timeout: 15s
      sending_queue:
        enabled: true
        num_consumers: 5
        queue_size: 5000
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s
        max_elapsed_time: 300s     # bỏ cuộc sau 5 phút

    elasticsearch:
      endpoints: "https://eck-elasticsearch-es-http.observability.svc:9200"
      user: elastic
      password: "${env:ELASTIC_PASSWORD}"    # inject từ K8s secret
      tls:
        insecure: false
        ca_file: /etc/tls/certs/elasticsearch/ca.crt
      logs_index: otel-logs
      sending_queue:
        enabled: true
        num_consumers: 5
        queue_size: 5000
      

    debug:
      verbosity: detailed

  connectors:
    spanmetrics:
      histogram:
        explicit:
          buckets: [1ms, 5ms, 10ms, 50ms, 100ms, 250ms, 500ms, 1s]

    servicegraph:
      latency_histogram_buckets: [1ms, 5ms, 10ms, 50ms, 100ms, 250ms,500ms, 1s]
      dimensions:
        # - k8s.namespace.name
        - k8s.service.name
  extensions:
   health_check:
    endpoint: 0.0.0.0:13133

   pprof:
    endpoint: 0.0.0.0:1777

   zpages:
    endpoint: 0.0.0.0:55679

  service:
    extensions:
    - health_check
    - pprof
    - zpages
    pipelines:
      traces:
        receivers: [otlp]
        processors: 
         - memory_limiter
         - transform
         - tail_sampling 
         - batch
        exporters:
          - otlp/jaeger
          - spanmetrics
          - servicegraph

      metrics:
        receivers:
          - otlp
          - spanmetrics
          - servicegraph
          - prometheus
        processors:
          - memory_limiter
          - batch

        exporters:
          - prometheus

      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters:
          - elasticsearch
    telemetry:
      resource:
        k8s.namespace.name: "${env:OTEL_K8S_NAMESPACE}"
        k8s.node.name: "${env:OTEL_K8S_NODE_NAME}"
        k8s.node.ip: "${env:OTEL_K8S_NODE_IP}"
        k8s.pod.name: "${env:OTEL_K8S_POD_NAME}"
        k8s.pod.ip: "${env:OTEL_K8S_POD_IP}"
        host.name: "${env:OTEL_K8S_NODE_NAME}"
      metrics:
        readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888
resources:
  requests:
    memory: "256Mi"
    cpu: "500m"
  limits:
    memory: "500Mi"
    cpu: "1"

extraEnvs: 
  - name: ELASTIC_PASSWORD
    valueFrom:
      secretKeyRef:
        name: eck-elasticsearch-es-elastic-user
        key: elastic 

extraVolumes:
  - name: elastic-ca
    secret:
      secretName: eck-elasticsearch-es-http-certs-public

extraVolumeMounts:
  - name: elastic-ca
    mountPath: /etc/tls/certs/elasticsearch
    readOnly: true

serviceAccount:
  create: true

clusterRole:
  create: true
  rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
