apiVersion: "apps/v1"
mode: daemonset
fullnameOverride: opentelemetrycollector-daemonset
config:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: "0.0.0.0:4318"
          cors:
           allowed_origins:  
            - "https://*"  # cho phép frontend gửi
        grpc:
          endpoint: "0.0.0.0:4317"

    filelog:
      
      include:
        - /var/log/*/*/*.log
        - /var/log/containers/*.log
      exclude: 
        - /var/log/pods/*/opentelemetrycollector-daemonset/*.log  # tránh đọc log của chính mình
        - /var/log/pods/*/opentelemetry-collector-gateway/*.log  
      start_at: end
      include_file_name: true
      include_file_path: true
      operators:
        - type: container

    kubeletstats:
      collection_interval: 30s
      auth_type: serviceAccount
      endpoint: https://${env:OTEL_K8S_NODE_NAME}:10250
      insecure_skip_verify: true
      metric_groups:
        - node
        - pod
        - container

    k8s_cluster:
      collection_interval: 30s
      node_conditions_to_report: [Ready, MemoryPressure]
      allocatable_types_to_report:
        - cpu
        - memory

    hostmetrics:
      root_path: /hostfs
      scrapers:
        cpu:
          metrics:
            system.cpu.utilization:
              enabled: true
        disk:
        load:
        filesystem:
          exclude_mount_points:
            mount_points:
              - /dev/*
              - /proc/*
              - /sys/*
              - /run/k3s/containerd/*
              - /var/lib/docker/*
              - /var/lib/kubelet/*
              - /snap/*
            match_type: regexp
          exclude_fs_types:
            fs_types:
              - autofs
              - binfmt_misc
              - bpf
              - cgroup2
              - configfs
              - debugfs
              - devpts
              - devtmpfs
              - fusectl
              - hugetlbfs
              - iso9660
              - mqueue
              - nsfs
              - overlay
              - proc
              - procfs
              - pstore
              - rpc_pipefs
              - securityfs
              - selinuxfs
              - squashfs
              - sysfs
              - tracefs
            match_type: strict
        memory:
          metrics:
            system.memory.utilization:
              enabled: true
        network:
        paging:
        processes:
        process:
          mute_process_exe_error: true
          mute_process_io_error: true
          mute_process_user_error: true

  processors:
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80     # đặt bằng 80% memory limit của container
      spike_limit_percentage: 25   # buffer cho traffic đột biến

    k8sattributes:
      auth_type: serviceAccount
      filter:
        node_from_env_var: OTEL_K8S_NODE_NAME  # chỉ lookup pods trên node này
      extract:
        metadata:
          - k8s.pod.name
          - k8s.namespace.name
          - k8s.deployment.name
          - k8s.node.name
          - k8s.pod.start_time
          - k8s.pod.uid
      pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip

    batch:
      send_batch_size: 500     
      send_batch_max_size: 1500  # giới hạn tối đa mỗi batch
      timeout: 3s               # gửi sau 3s dù chưa đủ batch

  exporters:
    loadbalancing/otlp-trace:
      routing_key: traceID
      protocol:
        otlp:
          timeout: 5s
          tls:
            insecure: true
          sending_queue:
            enabled: true
            num_consumers: 5
            queue_size: 1000
          retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s     # bỏ cuộc sau 5 phút

      resolver:
        dns:
          hostname: opentelemetrycollector-gateway.otel.svc.cluster.local:4317

    loadbalancing/otlp:
      routing_key: service
      protocol:
        otlp:
          endpoint: opentelemetrycollector-gateway:4317
          timeout: 5s
          tls:
            insecure: true
          sending_queue:
            enabled: true
            num_consumers: 5
            queue_size: 1000
          retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s     # bỏ cuộc sau 5 phút

      resolver:
       dns:
        hostname: opentelemetrycollector-gateway.otel.svc.cluster.local:4317

    debug:
      verbosity: detailed
  extensions:
   health_check:
    endpoint: 0.0.0.0:13133

   pprof:
    endpoint: 0.0.0.0:1777

   zpages:
    endpoint: 0.0.0.0:55679

  service:
    extensions:
    - health_check
    - pprof
    - zpages
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, batch]
        exporters: [loadbalancing/otlp-trace]

      metrics:
        receivers: [otlp,kubeletstats,k8s_cluster]
        processors: [memory_limiter, k8sattributes, batch]
        exporters: [loadbalancing/otlp]

      logs:
        receivers: [otlp, filelog]
        processors: [memory_limiter, k8sattributes, batch]
        exporters: [loadbalancing/otlp]
    telemetry:
      resource:
        k8s.namespace.name: "${env:OTEL_K8S_NAMESPACE}"
        k8s.node.name: "${env:OTEL_K8S_NODE_NAME}"
        k8s.node.ip: "${env:OTEL_K8S_NODE_IP}"
        k8s.pod.name: "${env:OTEL_K8S_POD_NAME}"
        k8s.pod.ip: "${env:OTEL_K8S_POD_IP}"
        host.name: "${env:OTEL_K8S_NODE_NAME}"
      metrics:
        readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888
image:
  repository: "otel/opentelemetry-collector-contrib"  # Use contrib image
  tag: "0.154.0"  # Specify the desired tag
  pullPolicy: "IfNotPresent"

  
command:
  name: "otelcol-contrib"  # Optional: Update command name if necessary

service:
  enabled: true
  type: ClusterIP


resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
    appProtocol: grpc
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

serviceAccount:
  create: true

clusterRole:
  create: true
  rules:
  - apiGroups: [""]
    resources: ["pods", "nodes/stats","nodes", "namespaces",
                "endpoints", "services"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments",
                "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["resourcequotas", "persistentvolumeclaims",
                "persistentvolumes"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

extraVolumes:
  - name: hostfs
    hostPath:
      path: /
      type: Directory

  - name: varlogpods
    hostPath:
      path: /var/log/pods
      type: Directory

  - name: varlogcontainers
    hostPath:
      path: /var/log/containers
      type: Directory

extraVolumeMounts: 
  - name: hostfs
    mountPath: /hostfs
    readOnly: true
    
  - name: varlogpods
    mountPath: /var/log/pods
    readOnly: true

  - name: varlogcontainers
    mountPath: /var/log/containers
    readOnly: true

